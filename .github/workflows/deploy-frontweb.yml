name: Deploy FrontWeb

on:
  push:
    branches: [main]
    paths:
      - 'frontweb/**'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET: blogpost-front-server
  CLOUDFRONT_DISTRIBUTION_ID: EKAIZKGAY99DR

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: frontweb

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontweb/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::589794546244:role/github-actions-cicd
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
