<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevelopTag - 이번 주 추천 포스트</title>
</head>
<body style="margin:0;padding:0;background-color:#f3f4f6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f3f4f6;">
        <tr>
            <td align="center" style="padding:24px 16px;">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">
                    <!-- Header -->
                    <tr>
                        <td style="background:#7c3aed;border-radius:12px 12px 0 0;padding:32px 24px;text-align:center;">
                            <h1 style="margin:0;color:#ffffff;font-size:28px;font-weight:700;letter-spacing:-0.5px;">DevelopTag</h1>
                            <p style="margin:8px 0 0 0;color:#e9d5ff;font-size:16px;">이번 주 추천 포스트</p>
                        </td>
                    </tr>
                    <!-- Body -->
                    <tr>
                        <td style="background:#ffffff;padding:24px;">
                            <p style="margin:0 0 20px 0;color:#374151;font-size:15px;line-height:1.6;">
                                안녕하세요! 이번 주 관심사에 맞춰 선별한 포스트를 소개합니다.
                            </p>
                            {{POSTS}}
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td style="background:#f9fafb;border-radius:0 0 12px 12px;padding:24px;text-align:center;border-top:1px solid #e5e7eb;">
                            <p style="margin:0 0 8px 0;color:#9ca3af;font-size:13px;">
                                더 많은 포스트를 확인하세요
                            </p>
                            <a href="{{SITE_URL}}" style="display:inline-block;background:#7c3aed;color:#ffffff;text-decoration:none;padding:10px 24px;border-radius:6px;font-size:14px;font-weight:600;margin-bottom:16px;">DevelopTag 방문하기</a>
                            <p style="margin:16px 0 0 0;color:#9ca3af;font-size:12px;">
                                <a href="{{SITE_URL}}/my/profile" style="color:#7c3aed;text-decoration:underline;">수신 설정 변경</a>
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
